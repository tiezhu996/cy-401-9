name: cyfreelance

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-cyfreelance}-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-38101}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-cyfreelance}-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-29068}:29068"
    environment:
      NODE_ENV: production
      BACKEND_PORT: 29068
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TYPEORM_SYNC: ${TYPEORM_SYNC:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29068/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME:-cyfreelance}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-28030}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
